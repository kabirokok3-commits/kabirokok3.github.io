<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows XP Desktop</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Tahoma, sans-serif;
    background:#008080;
    height:100vh;
    user-select:none;
}

.icon{
    width:100px;
    text-align:center;
    color:white;
    margin:20px;
    cursor:pointer;
}

.icon img{
    width:64px;
    height:64px;
}

.icon span{
    display:block;
    margin-top:6px;
    text-shadow:1px 1px black;
    font-size:14px;
}

.taskbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:40px;
    background:linear-gradient(to bottom,#245edb,#1941a5);
    border-top:2px solid #6ea0ff;
    display:flex;
    align-items:center;
}

.start{
    height:32px;
    margin-left:4px;
    padding:0 18px;
    border-radius:20px;
    border:none;
    font-size:18px;
    font-weight:bold;
    color:white;
    background:linear-gradient(to bottom,#3cb043,#1f7a1f);
    box-shadow:inset 0 2px #7dff7d;
}

.clock{
    margin-left:auto;
    margin-right:15px;
    color:white;
    font-size:14px;
}

</style>
</head>
<body>

<div class="icon" ondblclick="openGame()">

    <img src="Timingicon.png">

    <span>Timing Game</span>

</div>

<div class="taskbar">

    <button class="start">start</button>

    <div class="clock" id="clock"></div>

</div>

<script>

function openGame(){

    window.location.href = "Timinggame.html";
}

function updateClock(){

    const now = new Date();

    let hours = now.getHours();
    let minutes = now.getMinutes();

    minutes = minutes < 10 ? "0" + minutes : minutes;

    document.getElementById("clock").textContent =
        hours + ":" + minutes;
}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
